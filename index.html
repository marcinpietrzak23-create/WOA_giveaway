<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Giveaway</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
margin:40px;
margin-right:200px;
}

h1{
font-size:40px;
}

#clock{
font-size:22px;
margin-top:10px;
}

#countdown{
font-size:20px;
margin-bottom:5px;
}

#lastWinner{
font-size:26px;
margin-bottom:20px;
color:#ffd700;
font-weight:bold;
}

button{
font-size:20px;
padding:15px 30px;
margin:20px;
cursor:pointer;
border:none;
background:#444;
color:white;
}

button:hover{
background:#666;
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

#winner{
font-size:32px;
margin:30px;
height:40px;
}

table{
margin:auto;
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #555;
padding:8px 12px;
}

th{
background:#222;
}

/* ---------- DONORS PANEL ---------- */

#hall{
position:absolute;
right:20px;
top:120px;
width:470px;
background:#1a1a1a;
padding:15px;
border:1px solid #444;
border-radius:8px;
box-sizing:border-box;
overflow:hidden;
}

#hall table{
width:100%;
font-size:12px;
margin-top:10px;
table-layout:fixed;
border-collapse:collapse;
}

#hall th,#hall td{
padding:4px;
text-align:center;
overflow:hidden;
white-space:nowrap;
}

#hall th:first-child,
#hall td:first-child{
width:190px;
text-align:left;
padding-left:8px;
}

#hall th:not(:first-child),
#hall td:not(:first-child){
width:38px;
}

/* ---------- GIFT RACE PANEL ---------- */

#giftRace{
position:absolute;
left:40px;
top:120px;
width:260px;
background:#1a1a1a;
padding:15px;
border:1px solid #444;
border-radius:8px;
}

.progressRow{
margin-bottom:15px;
text-align:left;
}

.progressName{
font-size:16px;
margin-bottom:3px;
}

.progressBar{
width:100%;
background:#333;
border-radius:6px;
height:16px;
overflow:hidden;
}

.progressFill{
height:100%;
background:#4caf50;
width:0%;
transition:width 0.5s;
}

.progressPoints{
font-size:12px;
opacity:0.8;
}

</style>

</head>

<body>

<h1>🎲 Giveaway</h1>

<div id="clock"></div>
<div id="countdown"></div>
<div id="lastWinner">🏆 Last winner: -</div>
<div id="giftRace">
<h3>🎁 Gift Race</h3>
<div id="giftRaceContent"></div>
</div>
<div id="hall">

<h3>🎁 Donors</h3>

<table id="hallTable"></table>

</div>
<button id="drawBtn" onclick="draw()" style="display:none">
DRAW WINNER
</button>

<div id="winner">Ready</div>

<h2>Players</h2>
<table id="players"></table>

<h2>Logs</h2>
<table id="logs"></table>

<script>
async function loadHallOfFame(){

try{

const r = await fetch(API+"?action=halloffame")
const data = await r.json()

/* SORTOWANIE PO TOTAL */
data.sort((a,b)=>b.total-a.total)

let html = `
<tr>
<th>Nick</th>
<th>🚗</th>
<th>🚀</th>
<th>👑</th>
<th>🔫</th>
<th>Total</th>
</tr>
`

data.forEach((d,index)=>{

let medal=""

if(index===0) medal="🥇 "
if(index===1) medal="🥈 "
if(index===2) medal="🥉 "

html += `
<tr>
<td>${medal}${d.nick}</td>
<td>${d.car}</td>
<td>${d.rocket}</td>
<td>${d.crown}</td>
<td>${d.pistol}</td>
<td><b>${d.total}</b></td>
</tr>
`

})

document.getElementById("hallTable").innerHTML = html

}catch(e){
console.log("hall load error")
}

}
const API="https://script.google.com/macros/s/AKfycbx4W6dL9elENWzGRfivRN0xnxR937vc16LyOB3wJ0MC5RNExa_TQXwjKOOHJXsWRnXP/exec"
const ADMIN_KEY="dannyistoolucky"

let players=[]
let adminMode=false
let nextDrawTime=null
let lastDraw=0

window.onload = function(){

const params = new URLSearchParams(window.location.search)
const ADMIN = params.get("admin")

if(ADMIN === ADMIN_KEY){
document.getElementById("drawBtn").style.display="inline-block"
adminMode=true
}

loadNextDraw()
loadPlayers()
loadLogs()
loadHallOfFame()
loadGiftRace()
  
setInterval(updateClock,1000)
setInterval(detectNewDraw,5000)
loadGiftRace()
}

async function loadNextDraw(){

try{

const r = await fetch(API + "?action=nextdraw")
const data = await r.json()

if(data.time){
nextDrawTime=new Date(data.time)
}

}catch(e){
console.log("Next draw load error")
}

}

function updateClock(){

const now = new Date()

document.getElementById("clock").innerText =
now.toLocaleDateString()+" "+now.toLocaleTimeString()

if(!nextDrawTime){
document.getElementById("countdown").innerText="Next draw not scheduled"
return
}

const diff = nextDrawTime - now

if(diff <= 0){

document.getElementById("countdown").innerText="Next draw not scheduled"
nextDrawTime = null

loadLogs()
loadPlayers()

return
}

const h=Math.floor(diff/1000/60/60)
const m=Math.floor(diff/1000/60 % 60)
const s=Math.floor(diff/1000 % 60)

document.getElementById("countdown").innerText =
"Next draw in: "+h+"h "+m+"m "+s+"s"

}

async function loadPlayers(){

try{

const r=await fetch(API+"?action=players")
players=await r.json()

let html="<tr><th>Nick</th><th>Tickets</th></tr>"

players.forEach(p=>{

const total=Number(p.base)+Number(p.bonus)

html+=`<tr>
<td>${p.nick}</td>
<td>${total}</td>
</tr>`

})

document.getElementById("players").innerHTML=html

}catch(e){
console.error("Players load error")
}

}

async function loadLogs(){

try{

const r=await fetch(API+"?action=logs")
const data=await r.json()

let html="<tr><th>Draw</th><th>Winner</th><th>Distribution</th><th>Time</th></tr>"

data.slice().reverse().forEach(l=>{

html+=`<tr>
<td>${l.draw}</td>
<td>${l.winner}</td>
<td>${l.distribution}</td>
<td>${new Date(l.time).toLocaleString()}</td>
</tr>`

})

document.getElementById("logs").innerHTML=html

if(data.length>0){

const last=data[data.length-1]

document.getElementById("lastWinner").innerText=
"🏆 Last winner: "+last.winner

}

}catch(e){
console.error("Logs load error")
}

}

async function detectNewDraw(){

try{

const r=await fetch(API+"?action=logs")
const data=await r.json()

if(data.length===0) return

const latest=data[data.length-1]

if(lastDraw===0){
lastDraw=latest.draw
return
}

if(latest.draw!==lastDraw){

lastDraw=latest.draw

playDrawAnimation(latest.winner)

loadLogs()

}

}catch(e){
console.log("detect draw error")
}

}

async function draw(){

if(!adminMode) return

const btn=document.getElementById("drawBtn")
const winnerBox=document.getElementById("winner")

btn.disabled=true
winnerBox.innerText="🎲 Drawing..."

await spinAnimation()

try{

const r=await fetch(API+"?action=draw&key="+ADMIN_KEY)
const data=await r.json()

winnerBox.innerText="🏆 Winner: "+data.winner

}catch(e){

winnerBox.innerText="Error during draw"

}

setTimeout(loadLogs,1000)

btn.disabled=false

}

async function spinAnimation(){

const winnerBox=document.getElementById("winner")

if(players.length===0) return

for(let i=0;i<20;i++){

const randomPlayer=players[Math.floor(Math.random()*players.length)]

winnerBox.innerText=randomPlayer.nick

await new Promise(r=>setTimeout(r,80))

}

}

async function playDrawAnimation(winner){

const winnerBox=document.getElementById("winner")

for(let i=0;i<20;i++){

const randomPlayer=players[Math.floor(Math.random()*players.length)]

winnerBox.innerText=randomPlayer.nick

await new Promise(r=>setTimeout(r,70))

}

winnerBox.innerText="🏆 Winner: "+winner

}
async function loadGiftRace(){

try{

const r = await fetch(API+"?action=gifts")
const data = await r.json()

let html=""

Object.entries(data).forEach(([nick,points])=>{

const percent = Math.min(100,(points/4000)*100)

let color="#4caf50"

if(points>=4000){
color="lime"
}

html += `
<div class="progressRow">

<div class="progressName">${nick}</div>

<div class="progressBar">
<div class="progressFill" style="width:${percent}%;background:${color}"></div>
</div>

<div class="progressPoints">${points} / 4000</div>

</div>
`

})

document.getElementById("giftRaceContent").innerHTML=html

}catch(e){
console.log("gift race error")
}

}
</script>

</body>
</html>
