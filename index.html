<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Giveaway</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
margin:40px;
}

h1{
font-size:40px;
}

button{
font-size:20px;
padding:15px 30px;
margin:20px;
cursor:pointer;
border:none;
background:#444;
color:white;
}

button:hover{
background:#666;
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

#winner{
font-size:32px;
margin:30px;
height:40px;
}

table{
margin:auto;
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #555;
padding:8px 12px;
}

th{
background:#222;
}

</style>

</head>

<body>

<h1>🎲 Giveaway</h1>

<button id="drawBtn" onclick="draw()" style="display:none">
DRAW WINNER
</button>

<div id="winner">Ready</div>

<h2>Players</h2>
<table id="players"></table>

<h2>Logs</h2>
<table id="logs"></table>

<script>

const API="https://script.google.com/macros/s/AKfycbx4W6dL9elENWzGRfivRN0xnxR937vc16LyOB3wJ0MC5RNExa_TQXwjKOOHJXsWRnXP/exec"
const ADMIN_KEY="dannyistoolucky"

let players=[]
let adminMode=false

window.onload = function(){

const params = new URLSearchParams(window.location.search)
const ADMIN = params.get("admin")

if(ADMIN === ADMIN_KEY){
document.getElementById("drawBtn").style.display="inline-block"
adminMode=true
}

loadPlayers()
loadLogs()

setInterval(loadLogs,10000)

}

async function loadPlayers(){

try{

const r = await fetch(API + "?action=players")
players = await r.json()

let html="<tr><th>Nick</th><th>Tickets</th></tr>"

players.forEach(p=>{

const total = Number(p.base) + Number(p.bonus)

html+=`<tr>
<td>${p.nick}</td>
<td>${total}</td>
</tr>`

})

document.getElementById("players").innerHTML = html

}catch(e){

console.error("Players load error",e)

}

}

async function loadLogs(){

try{

const r = await fetch(API + "?action=logs")
const data = await r.json()

let html="<tr><th>Draw</th><th>Winner</th><th>Distribution</th><th>Time</th></tr>"

data.reverse().forEach(l=>{

html+=`<tr>
<td>${l.draw}</td>
<td>${l.winner}</td>
<td>${l.distribution}</td>
<td>${new Date(l.time).toLocaleString()}</td>
</tr>`

})

document.getElementById("logs").innerHTML=html

}catch(e){

console.error("Logs load error",e)

}

}

async function draw(){

if(!adminMode) return

const btn = document.getElementById("drawBtn")
const winnerBox = document.getElementById("winner")

btn.disabled = true
winnerBox.innerText = "🎲 Drawing..."

await spinAnimation()

try{

const r = await fetch(API + "?action=draw&key=" + ADMIN_KEY)
const data = await r.json()

if(data.error){
winnerBox.innerText="Access denied"
}else{
winnerBox.innerText="🏆 Winner: " + data.winner
}

}catch(e){

winnerBox.innerText="Error during draw"

}

setTimeout(loadLogs,1000)

btn.disabled=false

}

async function spinAnimation(){

const winnerBox=document.getElementById("winner")

if(players.length===0) return

for(let i=0;i<20;i++){

const randomPlayer = players[Math.floor(Math.random()*players.length)]

winnerBox.innerText=randomPlayer.nick

await new Promise(r=>setTimeout(r,80))

}

}

</script>

</body>
</html>
